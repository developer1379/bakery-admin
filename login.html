<!DOCTYPE html>
<html lang="en" class="h-full bg-[#FAF7F2]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - L'Amour Du Pain</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Material Icons (Round) -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bakery: {
                            50: '#FDFBF7',
                            100: '#FAF4E8',
                            200: '#F3E5CC',
                            300: '#E6CFAB',
                            400: '#D5B484',
                            500: '#BD935C',
                            600: '#A47743',
                            700: '#875B30',
                            800: '#6A4320',
                            900: '#4D2E14',
                            950: '#271406',
                        },
                        espresso: {
                            50: '#F5F5F5',
                            100: '#EAE9E6',
                            200: '#D1CECB',
                            300: '#AC9F9A',
                            400: '#87746E',
                            500: '#695752',
                            600: '#53433E',
                            700: '#3D312E',
                            800: '#2A201E',
                            900: '#1C1513',
                            950: '#120C0A',
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    boxShadow: {
                        'm-flat': '0 2px 4px rgba(0,0,0,0.02), 0 4px 12px rgba(0,0,0,0.03)',
                        'm-elevated': '0 8px 30px rgba(77, 46, 20, 0.08)',
                        'm-high': '0 12px 40px rgba(0, 0, 0, 0.12)',
                        'm-fab': '0 4px 20px rgba(189, 147, 92, 0.4)',
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full text-espresso-900 font-sans flex items-center justify-center p-4 sm:p-6 bg-cover bg-center relative" style="background-image: linear-gradient(rgba(39, 20, 6, 0.6), rgba(39, 20, 6, 0.75)), url('https://images.unsplash.com/photo-1509440159596-0249088772ff?w=1600&auto=format&fit=crop&q=80')">

    <div class="w-full max-w-md bg-white/95 backdrop-blur-md rounded-3xl shadow-m-high border border-white/20 overflow-hidden p-8 space-y-6">
        <!-- Logo and Title -->
        <div class="flex flex-col items-center text-center space-y-2">
            <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-bakery-500 text-espresso-950 shadow-m-flat mb-2">
                <span class="material-icons-round text-3xl text-white">bakery_dining</span>
            </div>
            <h1 class="font-serif text-2xl font-bold text-espresso-950 tracking-wide">L'Amour Du Pain</h1>
            <p class="text-xs font-semibold text-bakery-600 uppercase tracking-widest">Bakery Suite Admin Portal</p>
        </div>

        <!-- Alert info -->
        <div class="bg-bakery-100 border border-bakery-200/50 rounded-xl p-3 flex items-start gap-2.5">
            <span class="material-icons-round text-bakery-700 text-sm mt-0.5">info</span>
            <div>
                <h4 class="text-xxs font-bold text-espresso-900 uppercase tracking-wider">Demo Credentials</h4>
                <p class="text-xxs text-espresso-700 mt-0.5">Prefilled: Username <strong class="text-espresso-950">admin</strong> and Password <strong class="text-espresso-950">12345678</strong>.</p>
            </div>
        </div>

        <!-- Login Form -->
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <div class="space-y-1">
                <label class="text-xs font-bold text-espresso-600 uppercase tracking-wider block">Username</label>
                <div class="relative">
                    <span class="material-icons-round text-espresso-400 absolute left-3.5 top-3 text-lg">person</span>
                    <input type="text" id="username" required value="admin" class="w-full pl-10 pr-4 py-2.5 text-sm bg-espresso-50 border border-[#EAE3D5] rounded-xl focus:outline-none focus:ring-2 focus:ring-bakery-400 font-medium">
                </div>
            </div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-espresso-600 uppercase tracking-wider block">Password</label>
                <div class="relative">
                    <span class="material-icons-round text-espresso-400 absolute left-3.5 top-3 text-lg">lock</span>
                    <input type="password" id="password" required value="12345678" class="w-full pl-10 pr-4 py-2.5 text-sm bg-espresso-50 border border-[#EAE3D5] rounded-xl focus:outline-none focus:ring-2 focus:ring-bakery-400 font-medium">
                </div>
            </div>

            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center gap-2 text-xs font-semibold text-espresso-600 cursor-pointer">
                    <input type="checkbox" checked class="rounded border-[#EAE3D5] text-bakery-600 focus:ring-bakery-400">
                    Remember me
                </label>
                <a href="#" onclick="alert('Demo account: use admin / 12345678');" class="text-xs font-semibold text-bakery-600 hover:text-bakery-800 transition-colors">Forgot Password?</a>
            </div>

            <button type="submit" class="w-full bg-bakery-500 hover:bg-bakery-600 text-white font-bold py-3 px-4 rounded-xl text-sm transition-all shadow-m-flat hover:shadow-m-fab flex items-center justify-center gap-2">
                Sign In <span class="material-icons-round text-sm">login</span>
            </button>
        </form>
    </div>

    <!-- Error Toast -->
    <div id="login-toast" class="fixed bottom-6 right-6 z-50 bg-rose-950/95 text-white px-5 py-3.5 rounded-2xl shadow-m-high border border-rose-800 flex items-center gap-3 transition-all duration-300 translate-y-20 opacity-0 pointer-events-none">
        <span class="material-icons-round text-rose-400">error</span>
        <span class="text-sm font-bold" id="login-toast-message">Invalid credentials!</span>
    </div>

    <script>
        // Redirect if already logged in
        if (sessionStorage.getItem("bakery_logged_in") === "true") {
            window.location.href = "index.html";
        }

        function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            if (user === "admin" && pass === "12345678") {
                sessionStorage.setItem("bakery_logged_in", "true");
                window.location.href = "index.html";
            } else {
                showToast("Invalid username or password!", "error");
            }
        }

        function showToast(message) {
            const toast = document.getElementById("login-toast");
            const toastMsg = document.getElementById("login-toast-message");
            toastMsg.textContent = message;
            toast.classList.remove("translate-y-20", "opacity-0");
            toast.classList.add("translate-y-0", "opacity-100");

            setTimeout(() => {
                toast.classList.add("translate-y-20", "opacity-0");
                toast.classList.remove("translate-y-0", "opacity-100");
            }, 3500);
        }
    </script>
</body>
</html>
